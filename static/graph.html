<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mapping Human Reality — Header</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500;600&family=Rajdhani:wght@600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050a14;
      --border: #1a3a4a;
      --cyan: #00f2ff;
      --magenta: #ff00ff;
      --lime: #00ff00;
      --amber: #ffbf00;
      --red: #ff3366;
      --white: #ffffff;
      --meta: #5dade2;
      --bullet: #9b59ff;
      --font-display: "Space Grotesk", system-ui, sans-serif;
      --font-body: "IBM Plex Sans", system-ui, sans-serif;
      --font-pill: "Rajdhani", "IBM Plex Sans", system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      margin: 0;
      min-height: 0;
      background: radial-gradient(ellipse 120% 80% at 50% 0%, #0a1528 0%, #020408 55%);
      color: var(--white);
      font-family: var(--font-body);
      display: block;
      padding: clamp(0.75rem, 2vw, 1.25rem);
    }

    .header-shell {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--bg);
      box-shadow:
        0 0 0 1px rgba(0, 242, 255, 0.04),
        0 24px 80px rgba(0, 0, 0, 0.55),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
      overflow: hidden;
    }

    .graph-wrap {
      position: relative;
      height: clamp(220px, 32vw, 380px);
      background: linear-gradient(180deg, #070f1c 0%, #050a14 100%);
    }

    .graph-wrap canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .graph-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, transparent 55%, var(--bg) 100%);
    }

    .content {
      position: relative;
      padding: clamp(1.5rem, 4vw, 2.75rem) clamp(1.25rem, 4vw, 3rem) clamp(1.25rem, 3vw, 2rem);
      text-align: center;
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(1.55rem, 4.2vw, 2.85rem);
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 1.05;
      margin-bottom: 0.55em;
      text-wrap: balance;
      font-synthesis: none;
      text-rendering: optimizeLegibility;
      background: linear-gradient(
        118deg,
        #ffffff 0%,
        #eef7ff 22%,
        #9fe8ff 48%,
        #ffffff 62%,
        #dcefff 88%,
        #b8f0ff 100%
      );
      background-size: 180% 100%;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 28px rgba(0, 242, 255, 0.22)) drop-shadow(0 2px 24px rgba(0, 80, 160, 0.35));
    }

    @supports not (background-clip: text) {
      h1 {
        color: #f2f8ff;
        -webkit-text-fill-color: currentColor;
        background: none;
        filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.25));
      }
    }

    .tagline {
      font-family: var(--font-body);
      font-size: clamp(0.95rem, 1.75vw, 1.12rem);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.01em;
      color: rgba(230, 240, 255, 0.82);
      max-width: 48em;
      margin: 0 auto 1.75rem;
      line-height: 1.65;
      text-wrap: balance;
      text-rendering: optimizeLegibility;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: clamp(0.75rem, 3vw, 2rem);
      margin-bottom: 1.5rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-pill);
      font-size: clamp(0.72rem, 1.35vw, 0.88rem);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(248, 252, 255, 0.94);
    }

    .pill::before {
      content: "";
      width: 8px;
      height: 8px;
      background: var(--bullet);
      box-shadow: 0 0 12px rgba(155, 89, 255, 0.65);
      flex-shrink: 0;
    }

    footer.meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 0.75rem;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: clamp(0.62rem, 1vw, 0.72rem);
      font-weight: 500;
      color: var(--meta);
      opacity: 0.92;
      padding-top: 0.25rem;
      border-top: 1px solid rgba(26, 58, 74, 0.55);
      letter-spacing: 0.06em;
    }

    footer.meta span:last-child {
      text-align: right;
    }

    @media (max-width: 520px) {
      .pill-row { flex-direction: column; align-items: center; }
      footer.meta { flex-direction: column; text-align: center; }
      footer.meta span:last-child { text-align: center; }
    }
  </style>
</head>
<body>
  <header class="header-shell" role="banner">
    <div class="graph-wrap" aria-hidden="true">
      <canvas id="net"></canvas>
    </div>
    <div class="content">
      <h1>Mapping Human Reality in Real-Time</h1>
      <p class="tagline">
        Every dot is an entity. Every line is a relationship. Every simulation maps reality.
      </p>
      <div class="pill-row">
        <span class="pill">Media interactions</span>
        <span class="pill">Policy implications</span>
        <span class="pill">Institutional shifts</span>
      </div>
      <footer class="meta">
        <span id="simLine">SIMULATION ACTIVE: TENMIR_S.4.003</span>
        <span id="perfLine">FPS: — | MS923: —</span>
      </footer>
    </div>
  </header>

  <script>
    (function () {
      const canvas = document.getElementById("net");
      const ctx = canvas.getContext("2d", { alpha: false });
      const perfEl = document.getElementById("perfLine");

      const PALETTE = ["#00f2ff", "#ff00ff", "#00ff00", "#ffbf00", "#ff3366", "#ffff44"];

      let w = 0, h = 0, dpr = 1;
      let nodes = [];
      /** @type {number[][]} pairs of node indices */
      let persistentEdges = [];
      let last = performance.now();
      let frames = 0;
      let fps = 60;
      let fpsAccum = 0;
      let raf = 0;
      /** @type {number} next topology tweak (performance.now ms) */
      let nextInteractionMs = 0;

      const NAME_PREFIXES = [
        "TEN", "MIR", "SOL", "ARC", "NOV", "LYR", "ORI", "VEG", "KEP", "ZEN",
        "ION", "AXI", "NEX", "OMX", "REY", "ALT", "VEX", "SYN", "HEL", "DRA",
      ];

      function randomEntityName(used) {
        const hex = "0123456789ABCDEF";
        let name;
        let guard = 0;
        do {
          const p = NAME_PREFIXES[(Math.random() * NAME_PREFIXES.length) | 0];
          const a = hex[(Math.random() * hex.length) | 0];
          const b = hex[(Math.random() * hex.length) | 0];
          const n = ((Math.random() * 100) | 0).toString().padStart(2, "0");
          name = p + "-" + a + b + n;
          guard++;
        } while (used.has(name) && guard < 50);
        used.add(name);
        return name;
      }

      function buildGraph() {
        const area = w * h;
        const count = Math.min(140, Math.max(48, (area / 9000) | 0));
        nodes = [];
        const usedNames = new Set();
        for (let i = 0; i < count; i++) {
          nodes.push({
            x: Math.random() * w,
            y: Math.random() * h * 0.92,
            vx: (Math.random() - 0.5) * 0.175,
            vy: (Math.random() - 0.5) * 0.175,
            r: 1.2 + Math.random() * 2.2,
            c: PALETTE[(Math.random() * PALETTE.length) | 0],
            phase: Math.random() * Math.PI * 2,
            name: randomEntityName(usedNames),
          });
        }

        persistentEdges = buildStructuralEdges(nodes, 6);
      }

      /**
       * Undirected edges so every node is tied to its k nearest neighbors (plus deduped).
       * Reads as a deliberate graph, not only accidental proximity overlap.
       */
      function buildStructuralEdges(nodeList, kNearest) {
        const edgeSet = new Set();
        const add = (i, j) => {
          if (i === j) return;
          const lo = i < j ? i : j;
          const hi = i < j ? j : i;
          edgeSet.add(lo + "," + hi);
        };

        for (let i = 0; i < nodeList.length; i++) {
          const dists = [];
          for (let j = 0; j < nodeList.length; j++) {
            if (i === j) continue;
            dists.push({ j, d2: dist2(nodeList[i], nodeList[j]) });
          }
          dists.sort((a, b) => a.d2 - b.d2);
          const k = Math.min(kNearest, dists.length);
          for (let t = 0; t < k; t++) add(i, dists[t].j);
        }

        const bridgeCount = Math.min(36, Math.max(12, (nodeList.length / 4) | 0));
        for (let b = 0; b < bridgeCount; b++) {
          const i = (Math.random() * nodeList.length) | 0;
          const j = (Math.random() * nodeList.length) | 0;
          add(i, j);
        }

        const out = [];
        for (const key of edgeSet) {
          const parts = key.split(",");
          out.push([+parts[0], +parts[1]]);
        }
        return out;
      }

      function edgeKey(a, b) {
        return a < b ? a + "," + b : b + "," + a;
      }

      function edgesToSet(edges) {
        const s = new Set();
        for (let e = 0; e < edges.length; e++) {
          s.add(edgeKey(edges[e][0], edges[e][1]));
        }
        return s;
      }

      function setToEdges(s) {
        const out = [];
        for (const key of s) {
          const p = key.split(",");
          out.push([+p[0], +p[1]]);
        }
        return out;
      }

      function nudgeNodesForInteraction(indices) {
        for (let u = 0; u < indices.length; u++) {
          const n = nodes[indices[u]];
          if (!n) continue;
          n.vx += (Math.random() - 0.5) * 0.22;
          n.vy += (Math.random() - 0.5) * 0.22;
          n.phase += Math.random() * 0.9;
        }
      }

      /** Two links (a–b) and (c–d) swap pairings → (a–c)+(b–d) or (a–d)+(b–c). */
      function attemptCrossSwap() {
        if (persistentEdges.length < 2) return;
        for (let tries = 0; tries < 48; tries++) {
          const e1 = persistentEdges[(Math.random() * persistentEdges.length) | 0];
          const e2 = persistentEdges[(Math.random() * persistentEdges.length) | 0];
          if (e1 === e2) continue;
          const a = e1[0], b = e1[1], c = e2[0], d = e2[1];
          if (a === c && b === d) continue;
          if (a === d && b === c) continue;
          if (a === c || a === d || b === c || b === d) continue;

          const k1 = edgeKey(a, b);
          const k2 = edgeKey(c, d);
          const cross = Math.random() < 0.5;
          const nk1 = cross ? edgeKey(a, c) : edgeKey(a, d);
          const nk2 = cross ? edgeKey(b, d) : edgeKey(b, c);
          if (nk1 === nk2) continue;

          const temp = edgesToSet(persistentEdges);
          if (!temp.has(k1) || !temp.has(k2)) continue;
          temp.delete(k1);
          temp.delete(k2);
          if (temp.has(nk1) || temp.has(nk2)) continue;
          temp.add(nk1);
          temp.add(nk2);

          persistentEdges = setToEdges(temp);
          nudgeNodesForInteraction([a, b, c, d]);
          return;
        }
      }

      /** One relationship moves from anchor–oldOther to anchor–k. */
      function attemptRewireEndpoint() {
        if (persistentEdges.length < 1 || nodes.length < 4) return;
        const ei = (Math.random() * persistentEdges.length) | 0;
        const pair = persistentEdges[ei];
        const a0 = pair[0], b0 = pair[1];
        const anchor = Math.random() < 0.5 ? a0 : b0;
        const oldOther = anchor === a0 ? b0 : a0;
        const oldKey = edgeKey(a0, b0);

        for (let tries = 0; tries < 55; tries++) {
          const k = (Math.random() * nodes.length) | 0;
          if (k === anchor) continue;
          const nk = edgeKey(anchor, k);
          if (nk === oldKey) continue;

          const temp = edgesToSet(persistentEdges);
          if (!temp.has(oldKey)) continue;
          if (temp.has(nk)) continue;
          temp.delete(oldKey);
          temp.add(nk);
          persistentEdges = setToEdges(temp);
          nudgeNodesForInteraction([anchor, oldOther, k]);
          return;
        }
      }

      function resize() {
        const rect = canvas.getBoundingClientRect();
        dpr = Math.min(window.devicePixelRatio || 1, 2.5);
        w = Math.max(1, (rect.width * dpr) | 0);
        h = Math.max(1, (rect.height * dpr) | 0);
        canvas.width = w;
        canvas.height = h;
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        buildGraph();
        nextInteractionMs = 0;
      }

      function dist2(a, b) {
        const dx = a.x - b.x, dy = a.y - b.y;
        return dx * dx + dy * dy;
      }

      function step(dt) {
        const margin = 8 * dpr;
        const vMax = 0.31;
        for (const n of nodes) {
          n.x += n.vx * dt * 0.03;
          n.y += n.vy * dt * 0.03;
          n.phase += dt * 0.002;
          n.vx = Math.max(-vMax, Math.min(vMax, n.vx));
          n.vy = Math.max(-vMax, Math.min(vMax, n.vy));
          if (n.x < margin) { n.x = margin; n.vx *= -1; }
          if (n.x > w - margin) { n.x = w - margin; n.vx *= -1; }
          if (n.y < margin) { n.y = margin; n.vy *= -1; }
          if (n.y > h - margin) { n.y = h - margin; n.vy *= -1; }
        }
      }

      function draw(now) {
        const dt = Math.min(48, now - last);
        last = now;
        step(dt);

        if (persistentEdges.length && nodes.length > 3) {
          if (!nextInteractionMs) nextInteractionMs = now + 40 + Math.random() * 100;
          if (now >= nextInteractionMs) {
            nextInteractionMs = now + 22 + Math.random() * 48;
            const bursts = 4 + ((Math.random() * 6) | 0);
            for (let b = 0; b < bursts; b++) {
              if (Math.random() < 0.58) attemptCrossSwap();
              else attemptRewireEndpoint();
            }
          }
        }

        ctx.fillStyle = "#050a14";
        ctx.fillRect(0, 0, w, h);

        const minDim = Math.min(w, h);
        const linkDist2 = (minDim * 0.24) ** 2;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        ctx.lineWidth = 0.9 * dpr;
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const d2 = dist2(nodes[i], nodes[j]);
            if (d2 < linkDist2) {
              const alpha = 1 - d2 / linkDist2;
              ctx.strokeStyle = "rgba(140, 210, 255, " + (0.1 + alpha * 0.28).toFixed(3) + ")";
              ctx.beginPath();
              ctx.moveTo(nodes[i].x, nodes[i].y);
              ctx.lineTo(nodes[j].x, nodes[j].y);
              ctx.stroke();
            }
          }
        }

        ctx.lineWidth = 1.25 * dpr;
        for (let e = 0; e < persistentEdges.length; e++) {
          const i = persistentEdges[e][0];
          const j = persistentEdges[e][1];
          const a = nodes[i];
          const b = nodes[j];
          if (!a || !b) continue;
          const d2 = dist2(a, b);
          const span = Math.sqrt(d2) / minDim;
          const alpha = Math.max(0.18, Math.min(0.62, 0.58 - span * 0.55));
          ctx.strokeStyle = "rgba(170, 230, 255, " + alpha.toFixed(3) + ")";
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }

        for (const n of nodes) {
          const pulse = 0.85 + 0.15 * Math.sin(n.phase);
          const grd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r * 4 * dpr);
          grd.addColorStop(0, n.c);
          grd.addColorStop(0.35, n.c + "aa");
          grd.addColorStop(1, "transparent");
          ctx.fillStyle = grd;
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r * 4 * dpr * pulse, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#ffffff";
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r * dpr * pulse, 0, Math.PI * 2);
          ctx.fill();
        }

        const namePx = Math.max(7, Math.min(11, 8 * Math.sqrt(dpr))) * dpr;
        ctx.font = "500 " + namePx + "px JetBrains Mono, ui-monospace, monospace";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.lineJoin = "round";
        for (const n of nodes) {
          const pulse = 0.85 + 0.15 * Math.sin(n.phase);
          const ty = n.y + n.r * dpr * pulse + 2.5 * dpr;
          const label = n.name;
          ctx.lineWidth = 3 * dpr;
          ctx.strokeStyle = "rgba(5, 10, 20, 0.92)";
          ctx.strokeText(label, n.x, ty);
          ctx.lineWidth = 1.2 * dpr;
          ctx.strokeStyle = "rgba(100, 200, 255, 0.25)";
          ctx.strokeText(label, n.x, ty);
          ctx.fillStyle = "rgba(210, 235, 255, 0.82)";
          ctx.fillText(label, n.x, ty);
        }

        frames++;
        fpsAccum += dt;
        if (fpsAccum >= 500) {
          fps = (frames / (fpsAccum / 1000)) || 0;
          frames = 0;
          fpsAccum = 0;
          const ms = (12 + Math.random() * 0.8).toFixed(3);
          perfEl.textContent = "FPS: " + fps.toFixed(1) + " | MS923: " + ms;
        }

        raf = requestAnimationFrame(draw);
      }

      window.addEventListener("resize", resize, { passive: true });
      resize();
      raf = requestAnimationFrame(draw);
    })();
  </script>
</body>
</html>
