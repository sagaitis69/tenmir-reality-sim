<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TENMIR — Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050a14;
      --border: #1a3a4a;
      --cyan: #00f2ff;
      --white: #ffffff;
      --meta: #5dade2;
      --font-display: "Space Grotesk", system-ui, sans-serif;
      --font-body: "IBM Plex Sans", system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(ellipse 120% 80% at 50% 0%, #0a1528 0%, #020408 55%);
      color: var(--white);
      font-family: var(--font-body);
    }
    .top-bar {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0.65rem clamp(1rem, 4vw, 2rem);
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
    }
    .top-bar a {
      color: var(--meta);
      text-decoration: none;
      text-transform: uppercase;
    }
    .top-bar a:hover { color: var(--cyan); }
    .hero-frame {
      width: 100%;
      height: min(440px, 48vh);
      border: 0;
      display: block;
      background: var(--bg);
    }
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 clamp(1rem, 4vw, 2rem) clamp(2rem, 5vw, 3rem);
    }
    h2 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      color: rgba(240, 248, 255, 0.95);
    }
    .panel {
      border: 1px solid var(--border);
      background: rgba(5, 10, 20, 0.65);
      padding: 1.25rem 1.35rem;
      margin-bottom: 1.25rem;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }
    label { display: block; font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(200, 220, 255, 0.55); margin-bottom: 0.35rem; }
    textarea {
      width: 100%;
      min-height: 120px;
      padding: 0.75rem 0.85rem;
      border: 1px solid rgba(26, 58, 74, 0.9);
      border-radius: 2px;
      background: rgba(2, 6, 12, 0.85);
      color: #e8f2ff;
      font-family: var(--font-body);
      font-size: 0.95rem;
      line-height: 1.5;
      resize: vertical;
    }
    textarea:focus { outline: 1px solid rgba(0, 242, 255, 0.35); outline-offset: 1px; }
    .row { display: flex; flex-wrap: wrap; gap: 0.65rem; align-items: center; margin-top: 0.85rem; }
    button, .file-label {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.55rem 1rem;
      border: 1px solid rgba(0, 242, 255, 0.35);
      background: rgba(0, 242, 255, 0.08);
      color: #bfefff;
      cursor: pointer;
      border-radius: 2px;
    }
    button:hover, .file-label:hover { background: rgba(0, 242, 255, 0.14); }
    button:disabled { opacity: 0.45; cursor: wait; }
    .file-label input { display: none; }
    .status {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.68rem;
      color: var(--meta);
      letter-spacing: 0.04em;
    }
    .out {
      white-space: pre-wrap;
      font-size: 0.9rem;
      line-height: 1.55;
      color: rgba(230, 240, 255, 0.9);
      max-height: min(55vh, 520px);
      overflow: auto;
    }
    .out:empty::before { content: "Run a query to synthesize a grounded brief from your corpus + Gemma 4."; color: rgba(150, 180, 210, 0.45); }
    .note { font-size: 0.8rem; color: rgba(180, 200, 230, 0.55); line-height: 1.45; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="top-bar"><a href="/">← Dashboard</a></div>
  <iframe class="hero-frame" src="/graph.html" title="Network header"></iframe>
  <main>
    <section class="panel">
      <h2>Scenario</h2>
      <label for="q">Question or situation to analyze</label>
      <textarea id="q" placeholder="e.g. How might online discourse shift if a major platform introduces threaded-only political discussion?"></textarea>
      <div class="row">
        <button type="button" id="run">Run Gemma 4 brief</button>
        <label class="file-label">Upload book (.txt / .md / .pdf)<input type="file" id="file" accept=".txt,.md,.pdf" /></label>
        <button type="button" id="scan">Re-index books folder</button>
        <span class="status" id="status"></span>
      </div>
      <p class="note">Corpus path on disk: <code>knowledge/books/</code>. This is a lightweight MiroFish-style slice: retrieval + one Gemma 4 synthesis — not the full OASIS multi-agent simulator.</p>
    </section>
    <section class="panel">
      <h2>Output</h2>
      <div class="out" id="out"></div>
    </section>
  </main>
  <script>
    const q = document.getElementById("q");
    const out = document.getElementById("out");
    const run = document.getElementById("run");
    const scan = document.getElementById("scan");
    const status = document.getElementById("status");
    const file = document.getElementById("file");

    async function ping() {
      try {
        const r = await fetch("/api/health");
        const j = await r.json();
        status.textContent = j.has_api_key ? `chunks: ${j.chunks} · model: ${j.model}` : "chunks: " + j.chunks + " · set OPENAI_API_KEY";
      } catch (e) {
        status.textContent = "API unreachable";
      }
    }

    run.addEventListener("click", async () => {
      const text = q.value.trim();
      if (text.length < 4) return;
      run.disabled = true;
      out.textContent = "";
      status.textContent = "Calling Gemma 4…";
      try {
        const r = await fetch("/api/query", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: text }),
        });
        const j = await r.json();
        if (!r.ok) throw new Error(j.detail || r.statusText);
        out.textContent = j.answer;
        status.textContent = "used " + j.chunks_used + " passages";
      } catch (e) {
        out.textContent = String(e.message || e);
        status.textContent = "error";
      }
      run.disabled = false;
      ping();
    });

    scan.addEventListener("click", async () => {
      scan.disabled = true;
      status.textContent = "Indexing…";
      try {
        const r = await fetch("/api/ingest/scan", { method: "POST" });
        const j = await r.json();
        status.textContent = "indexed · total chunks " + j.chunks_total;
      } catch (e) {
        status.textContent = "scan failed";
      }
      scan.disabled = false;
      ping();
    });

    file.addEventListener("change", async () => {
      const f = file.files && file.files[0];
      if (!f) return;
      status.textContent = "Uploading…";
      const fd = new FormData();
      fd.append("file", f);
      try {
        const r = await fetch("/api/ingest/upload", { method: "POST", body: fd });
        const j = await r.json();
        if (!r.ok) throw new Error(j.detail || r.statusText);
        status.textContent = "uploaded · chunks " + j.chunks + " · total " + j.chunks_total;
      } catch (e) {
        status.textContent = String(e.message || e);
      }
      file.value = "";
      ping();
    });

    ping();
  </script>
</body>
</html>
